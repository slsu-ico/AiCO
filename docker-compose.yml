services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: aico
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d aico']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: 3000
      MESSENGER_VERIFY_TOKEN: dev-verify-token
      PAGE_ACCESS_TOKEN: replace-with-your-facebook-page-access-token
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/aico
      REDIS_URL: redis://redis:6379
      UPLOAD_DIR: uploads
      SESSION_SECRET: dev-session-secret-change-me
      BOOTSTRAP_ADMIN_EMAIL: admin@slsu.edu.ph
      BOOTSTRAP_ADMIN_PASSWORD: replace-before-running-seed
    ports:
      - '3000:3000'
    volumes:
      - ./uploads:/app/uploads

volumes:
  postgres-data:
  redis-data:
