name: Secret rotation

on:
  schedule:
    - cron: '0 18 1 * *'
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      phase:
        description: rotate or finalize
        required: true
        default: rotate

permissions:
  contents: read
  id-token: write

jobs:
  rotate:
    name: Rotate managed app secrets
    runs-on: ubuntu-latest
    if: (github.event_name == 'schedule' && github.event.schedule == '0 18 1 * *') || (github.event_name == 'workflow_dispatch' && inputs.phase == 'rotate')
    env:
      VAULT_ADDR: ${{ vars.VAULT_ADDR }}
      VAULT_SECRET_PATH: ${{ vars.VAULT_SECRET_PATH }}
      VAULT_JWT_AUTH_PATH: ${{ vars.VAULT_JWT_AUTH_PATH }}
      VAULT_JWT_ROLE: ${{ vars.VAULT_JWT_ROLE }}
      VAULT_NAMESPACE: ${{ vars.VAULT_NAMESPACE }}
      SECRET_ROTATION_TRANSITION_MINUTES: ${{ vars.SECRET_ROTATION_TRANSITION_MINUTES || '60' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Request GitHub OIDC token for Vault
        shell: bash
        run: |
          curl -sSf \
            -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=vault-aico" \
            | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>process.stdout.write(JSON.parse(d).value))" \
            > "$RUNNER_TEMP/vault.jwt"
          echo "VAULT_JWT_FILE=$RUNNER_TEMP/vault.jwt" >> "$GITHUB_ENV"

      - name: Rotate secrets and verify new key
        run: node scripts/rotate-managed-secrets.js rotate

  finalize:
    name: Finalize managed app secret rotation
    runs-on: ubuntu-latest
    if: (github.event_name == 'schedule' && github.event.schedule == '0 * * * *') || (github.event_name == 'workflow_dispatch' && inputs.phase == 'finalize')
    env:
      VAULT_ADDR: ${{ vars.VAULT_ADDR }}
      VAULT_SECRET_PATH: ${{ vars.VAULT_SECRET_PATH }}
      VAULT_JWT_AUTH_PATH: ${{ vars.VAULT_JWT_AUTH_PATH }}
      VAULT_JWT_ROLE: ${{ vars.VAULT_JWT_ROLE }}
      VAULT_NAMESPACE: ${{ vars.VAULT_NAMESPACE }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Request GitHub OIDC token for Vault
        shell: bash
        run: |
          curl -sSf \
            -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=vault-aico" \
            | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>process.stdout.write(JSON.parse(d).value))" \
            > "$RUNNER_TEMP/vault.jwt"
          echo "VAULT_JWT_FILE=$RUNNER_TEMP/vault.jwt" >> "$GITHUB_ENV"

      - name: Revoke previous keys after transition window
        run: node scripts/rotate-managed-secrets.js finalize
